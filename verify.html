<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Verification - OsintX.it</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <link rel="stylesheet" href="./styles/all.min.css">
  
  <style>
    :root {
      --bg: #000000;
      --bg-card: #0a0a0a;
      --text: #ffffff;
      --text-muted: #888888;
      --border: rgba(255,255,255,0.08);
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background gradients */
    .bg-gradients {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .gradient-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.04;
      animation: float-smooth 25s infinite ease-in-out;
    }

    .gradient-blob:nth-child(1) {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 70%);
      top: -200px;
      left: -200px;
    }

    .gradient-blob:nth-child(2) {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
      bottom: -150px;
      right: -150px;
      animation-delay: 10s;
    }

    @keyframes float-smooth {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, -50px) scale(1.1); }
    }

    .verify-container {
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 60px 50px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(255,255,255,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    .logo img {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 1rem;
      color: #666;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .turnstile-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .loading.active {
      display: flex;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      display: none;
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.3);
      color: #ff3b30;
      padding: 14px 20px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .error-message.active {
      display: block;
    }

    .security-note {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .security-note i {
      color: #888;
    }
  </style>
</head>
<body>
  <div class="bg-gradients">
    <div class="gradient-blob"></div>
    <div class="gradient-blob"></div>
  </div>

  <div class="verify-container">
    <div class="logo">
      <div>
        <span class="logo-text">OsintX<span class="logo-sub">.it</span></span>
      </div>
    </div>

    <h1>Security Verification</h1>
    <p class="subtitle">Please complete the verification to access the platform</p>

    <form id="verifyForm" method="POST" action="verify.php">
      <div class="turnstile-wrapper">
        <div class="cf-turnstile" 
             data-sitekey="0x4AAAAAACbNLFHEu-0e7KUn"
             data-callback="onTurnstileSuccess"
             data-error-callback="onTurnstileError"
             data-theme="dark"></div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Verifying...</span>
      </div>

      <div class="error-message" id="errorMessage">
        Verification failed. Please try again.
      </div>
    </form>

    <div class="security-note">
      <i class="fas fa-shield-alt"></i>
      <span>Protected by Cloudflare Turnstile</span>
    </div>
  </div>

  <script>
    function onTurnstileSuccess(token) {
      // Mostra il loading
      document.getElementById('loading').classList.add('active');
      document.getElementById('errorMessage').classList.remove('active');
      
      // Invia il form
      document.getElementById('verifyForm').submit();
    }

    function onTurnstileError() {
      document.getElementById('errorMessage').classList.add('active');
      document.getElementById('loading').classList.remove('active');
    }

    // Gestisci errori URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === '1') {
      document.getElementById('errorMessage').classList.add('active');
    }
  </script>
</body>
</html>
